<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RespawnTok – Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Left ad sidebar ── */
    .sidebar-ad {
      width: 200px;
      min-width: 200px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
      gap: 16px;
    }

    /* ── TikTok column (9:16 ratio, centred) ── */
    .tiktok-col {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: #000;
    }

    webview {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* Prevent white flash before TikTok loads */
    webview::part(content) { background: #000; }

    /* ── Right ad sidebar ── */
    .sidebar-ad.right {
      border-right: none;
      border-left: 1px solid #222;
    }

    /* ── Ad placeholder ── */
    .ad-block {
      width: 160px;
      height: 600px;
      background: #1a1a1a;
      border: 1px dashed #333;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 11px;
      text-align: center;
      gap: 8px;
    }

    .ad-block span { font-size: 22px; }

    /* ── Dismiss hint ── */
    .dismiss-hint {
      position: fixed;
      bottom: 16px;
      right: 210px;
      background: rgba(0,0,0,.7);
      color: #aaa;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 20px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Left ad sidebar -->
  <aside class="sidebar-ad">
    <!-- !! Replace the src URL with your hosted ad page URL !! -->
    <webview
      id="ad-left"
      src="https://YOUR_DOMAIN.com/ad.html"
      partition="persist:ads"
      nodeintegration="false"
      style="width:160px;height:600px;border:none;"
    ></webview>
  </aside>

  <!-- TikTok feed (9:16 centred column) -->
  <div class="tiktok-col">
    <webview
      id="tiktok"
      partition="persist:tiktok"
      allowpopups
    ></webview>
  </div>

  <!-- Right ad sidebar -->
  <aside class="sidebar-ad right">
    <div class="ad-block">
      <span>🎮</span>
      Skin Trading<br/>Banner
    </div>
  </aside>

  <div class="dismiss-hint">Alt + X to pause / resume</div>

  <script>
    // Hide a sidebar if its ad webview has a placeholder URL or fails to load
    function hideSidebarOf(webviewEl) {
      webviewEl.closest('.sidebar-ad').style.display = 'none';
    }

    document.querySelectorAll('.sidebar-ad webview').forEach((wv) => {
      const src = wv.getAttribute('src') || '';
      if (!src || src.includes('YOUR_DOMAIN')) {
        hideSidebarOf(wv);
        return;
      }
      wv.addEventListener('did-fail-load', () => hideSidebarOf(wv));
    });

    // Right sidebar has only a placeholder div — hide it unconditionally until real ads are wired up
    document.querySelectorAll('.sidebar-ad').forEach((s) => {
      if (!s.querySelector('webview')) s.style.display = 'none';
    });
  </script>
</body>
</html>
