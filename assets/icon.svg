<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a0a12"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fe2c55"/>
      <stop offset="100%" stop-color="#ff6b8a"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25f4ee"/>
      <stop offset="100%" stop-color="#25f4ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Teal respawn arc (top-right, partial circle) -->
  <path d="M 178 68 A 68 68 0 1 1 80 188" fill="none" stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>

  <!-- Respawn arrowhead at arc end -->
  <polygon points="68,198 92,180 76,172" fill="#25f4ee" opacity="0.85"/>

  <!-- Play triangle (centred, slightly right) -->
  <polygon points="100,84 100,172 182,128" fill="url(#playGrad)" filter="url(#glow)"/>
</svg>
